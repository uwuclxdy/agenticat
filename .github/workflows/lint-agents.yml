name: lint-agents

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: lint agent defs
        run: bun bin/lint-agents.ts agents --portable

      # A def that parses but converts to nothing usable still fails a user's install.
      - name: converter smoke test
        run: |
          bun bin/install-agents.ts --dest "$RUNNER_TEMP/out"
          for t in opencode codex; do
            n=$(find "$RUNNER_TEMP/out/$t" -name '*.md' -o -name '*.toml' | wc -l)
            a=$(find agents -name '*.md' | wc -l)
            [ "$n" -eq "$a" ] || { echo "$t: converted $n of $a defs"; exit 1; }
          done

      # grep rc: 0 = found (fail), 1 = clean (pass), 2 = a target path is missing (fail).
      - name: no machine-specific references
        run: |
          rc=0; out=$(grep -rEn '/home/|192\.168\.|cloudify|cloudy-' agents/ skills/ bin/ plugins/ .claude/ install.sh README.md) || rc=$?
          if [ "$rc" -ne 1 ]; then
            printf '%s\n' "$out"
            echo "machine-specific reference found (grep rc=$rc; 1 = clean)"
            exit 1
          fi

      # Structural '| — |' table cells (an intentionally empty column) are the one sanctioned use.
      - name: no em or en dashes
        run: |
          rc=0; out=$(grep -rn -e '—' -e '–' agents/ skills/ bin/ plugins/ .claude/ install.sh README.md) || rc=$?
          if [ "$rc" -eq 0 ]; then
            hits=$(printf '%s\n' "$out" | grep -v '| — |' || true)
            if [ -n "$hits" ]; then
              printf '%s\n' "$hits"
              echo "em/en dash found above"
              exit 1
            fi
          elif [ "$rc" -ne 1 ]; then
            echo "dash grep failed (rc=$rc)"
            exit 1
          fi

      - name: manifest validation
        run: |
          for f in .claude-plugin/marketplace.json plugins/agents/.claude-plugin/plugin.json plugins/skills/.claude-plugin/plugin.json; do
            jq -e 'has("$schema")' "$f" >/dev/null || { echo "$f: invalid JSON or missing \$schema"; exit 1; }
          done
          jq -e 'has("name") and has("version") and has("description")' gemini-extension.json >/dev/null \
            || { echo "gemini-extension.json: invalid JSON or missing name/version/description"; exit 1; }
